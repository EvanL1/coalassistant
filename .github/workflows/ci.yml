# 豆哥配煤 - 持续集成 (跑测试, 不打包)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            blend_kit_rs
            doudou_blend/src-tauri

      # blend_kit_rs 核心: 不依赖 Tauri / Android, 最简单
      - name: Test blend_kit
        working-directory: blend_kit_rs
        run: cargo test --release

      - name: Build blend_kit demo
        working-directory: blend_kit_rs
        run: cargo run --release --example demo

      - name: Build blend_kit master_demo
        working-directory: blend_kit_rs
        run: cargo run --release --example master_demo

      # Tauri 端: 仅 build, 不跑测试 (需要 Tauri 系统依赖)
      # 移除 tauri 测试以保持 CI 快速; 真正的端到端测试留给 release.yml
      - name: Format check
        run: |
          cargo fmt --manifest-path blend_kit_rs/Cargo.toml -- --check || echo "blend_kit_rs fmt issues (warn only)"

      - name: Clippy (blend_kit)
        working-directory: blend_kit_rs
        run: cargo clippy --release -- -D warnings || true
