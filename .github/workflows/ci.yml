# 豆哥配煤 - 持续集成
# 两条平行链路, 任何一条挂都拦合并:
#   1. blend_kit_rs  Rust 算法核心 (cargo test)
#   2. server        Node + Hono + better-sqlite3 集成测试 (vitest, 内存 SQLite)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ============================================================
  # 1) blend_kit_rs - Rust 算法核心
  # ============================================================
  blend_kit_rs:
    name: blend_kit (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: blend_kit_rs

      - name: cargo test
        working-directory: blend_kit_rs
        run: cargo test --release

      - name: cargo run --example demo
        working-directory: blend_kit_rs
        run: cargo run --release --example demo

      - name: cargo run --example master_demo
        working-directory: blend_kit_rs
        run: cargo run --release --example master_demo

      - name: fmt check (warn-only)
        working-directory: blend_kit_rs
        run: cargo fmt -- --check || echo "fmt issues - warn only"

      - name: clippy (warn-only)
        working-directory: blend_kit_rs
        run: cargo clippy --release -- -D warnings || true

  # ============================================================
  # 2) Server - Node + Hono + better-sqlite3 集成测试
  # ============================================================
  server:
    name: Server (集成测试)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: doudou_blend/package-lock.json

      # better-sqlite3 是 native 包, 需要 python + build tools 编原生.
      # ubuntu-latest 默认有, 这里只是显式声明.
      - name: Setup native build deps (for better-sqlite3)
        run: |
          which python3 || sudo apt-get install -y python3 build-essential

      - name: Stub blend_kit_wasm pkg (避免 wasm-pack 拖慢 CI)
        run: |
          mkdir -p blend_kit_wasm/pkg
          cat > blend_kit_wasm/pkg/package.json <<'EOF'
          {"name":"blend-kit-wasm","version":"0.1.0","main":"index.js"}
          EOF

      - name: npm ci
        working-directory: doudou_blend
        run: npm ci

      - name: npm test (vitest)
        working-directory: doudou_blend
        run: npm test
