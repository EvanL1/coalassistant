# 豆哥配煤 - Release 自动构建
#
# 触发: 推送 v*.*.* 格式的 tag (例: v0.1.0)
# 产出:
#   - Android APK (arm64 + armv7) - 主流移动机型
#   - macOS .dmg (universal, arm64+x86_64) - 桌面 Mac
# 上传: GitHub Releases (publish 态, 不再 draft)
#
# 注: Tauri 前端 build 时 TypeScript 要解析 import 'blend-kit-wasm',
# 所以即使 Tauri 运行时用 IPC 不用 WASM, build 流程也必须先跑 wasm-pack
# 生成 blend_kit_wasm/pkg/ 让 npm 能 resolve 这个 local file dep.
name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================
  # Android APK
  # ============================================================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: doudou_blend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android,wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            doudou_blend/src-tauri
            blend_kit_rs
            blend_kit_wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package (for npm resolve)
        working-directory: blend_kit_wasm
        run: wasm-pack build --target web --out-dir pkg --release

      - name: Install npm deps
        working-directory: doudou_blend
        run: npm install --no-package-lock-only

      - name: Initialize Tauri Android (one-time per CI run)
        working-directory: doudou_blend
        run: |
          npx @tauri-apps/cli android init --ci

      - name: Build APK
        working-directory: doudou_blend
        run: |
          npx @tauri-apps/cli android build --apk --target aarch64 --target armv7

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: doudou_blend/src-tauri/gen/android/**/*.apk
          if-no-files-found: error

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: doudou_blend/src-tauri/gen/android/**/*.apk
          generate_release_notes: true

  # ============================================================
  # macOS DMG
  # ============================================================
  macos:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: doudou_blend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            doudou_blend/src-tauri
            blend_kit_rs
            blend_kit_wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package (for npm resolve)
        working-directory: blend_kit_wasm
        run: wasm-pack build --target web --out-dir pkg --release

      - name: Install npm deps
        working-directory: doudou_blend
        run: npm install --no-package-lock-only

      - name: Build macOS DMG (universal)
        working-directory: doudou_blend
        run: npx @tauri-apps/cli build --target universal-apple-darwin

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: doudou_blend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Attach DMG to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: doudou_blend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
