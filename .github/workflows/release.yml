# 豆哥配煤 - Release 自动构建
#
# 触发: 推送 v*.*.* 格式的 tag (例: v0.1.0)
# 产出:
#   - Android APK (arm64 + armv7) - 主流移动机型
#   - macOS .dmg (universal, arm64+x86_64) - 桌面 Mac
# 上传: GitHub Releases (草稿态, 手动 publish)
#
# 不构建: Windows / iOS / 32 位 Android x86 (按需扩展)
name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:    # 也允许手动触发

permissions:
  contents: write       # 写 release

jobs:
  # ============================================================
  # Android APK
  # ============================================================
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: doudou_blend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            doudou_blend/src-tauri
            blend_kit_rs

      - name: Install npm deps
        working-directory: doudou_blend
        run: npm ci

      - name: Initialize Tauri Android (one-time per CI run)
        working-directory: doudou_blend
        run: |
          npx @tauri-apps/cli android init --ci

      - name: Build APK
        working-directory: doudou_blend
        run: |
          npx @tauri-apps/cli android build --apk --target aarch64 --target armv7

      - name: Locate APKs
        id: locate
        run: |
          find doudou_blend/src-tauri/gen/android -name "*.apk" -not -path "*intermediates*" || true
          echo "apk_dir=$(find doudou_blend/src-tauri/gen/android -type d -name "outputs" | head -1)" >> $GITHUB_OUTPUT

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: doudou_blend/src-tauri/gen/android/**/*.apk
          if-no-files-found: error

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: doudou_blend/src-tauri/gen/android/**/*.apk
          generate_release_notes: true

  # ============================================================
  # macOS DMG (开发者自测, 选做)
  # ============================================================
  macos:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: doudou_blend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            doudou_blend/src-tauri
            blend_kit_rs

      - name: Install npm deps
        working-directory: doudou_blend
        run: npm ci

      - name: Build macOS DMG (universal)
        working-directory: doudou_blend
        run: npx @tauri-apps/cli build --target universal-apple-darwin

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: doudou_blend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Attach DMG to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: doudou_blend/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
