# 豆哥配煤 - 鸿蒙 NEXT .hap 包构建
#
# 触发: 仅手动 (workflow_dispatch) 或 hap-v* tag.
# 不挂 push/PR, 避免每次烧 GH Actions macOS 配额 (10x 乘数).
#
# 产物: doudou_blend_flutter/build/ohos/outputs/.../entry-default-unsigned.hap
#       作为 GH Actions artifact 上传, 14 天保留.
#
# **当前状态: 实验性**
# 鸿蒙 Flutter 工程在 CI 上构建链路是:
#   1. 拉 OpenHarmony Flutter fork SDK (gitcode 镜像)
#   2. 装鸿蒙命令行 SDK (社区 mirror, 不需要华为账号)
#   3. flutter create . --platforms ohos  (生成 ohos/ 模块)
#   4. 装 pubspec_overrides.yaml 把插件指向 OH 端口
#   5. flutter build hap --debug
#
# 已知卡点 (持续迭代):
#   - macOS runner 频繁撞 GitHub API rate limit, 所以 SDK URL 硬编码 (写死版本)
#   - 插件 OH 端口的版本兼容 (sqflite_ohos 跟主 sqflite 版本对得上才行)
#   - 签名: 当前只出 unsigned .hap, 装真机需要 dev cert. 后续加 secrets.
name: Build HarmonyOS .hap

on:
  workflow_dispatch:
  push:
    tags:
      - 'hap-v*'

env:
  # 硬编码 OpenHarmony cmdline SDK 版本 (社区 mirror, 不需要华为账号).
  # 用 API 查 /releases/latest 会撞 GH runner 共享 IP 的 rate limit. 写死.
  HOS_CMDLINE_URL: https://github.com/harmonyos-dev/hos-sdk/releases/download/v2.0.2/commandline-tools-mac-2.0.0.2.zip

jobs:
  build:
    name: Build .hap (experimental)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ----------------------------------------------------------
      # 1) Flutter for OpenHarmony fork
      # ----------------------------------------------------------
      - name: Clone Flutter OH fork
        run: |
          set -euo pipefail
          git clone --depth 1 https://gitcode.com/openharmony-sig/flutter_flutter.git $HOME/flutter_ohos
          echo "$HOME/flutter_ohos/bin" >> $GITHUB_PATH
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter --version || true

      - name: Pre-cache Flutter
        run: |
          set -euo pipefail
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter precache

      # ----------------------------------------------------------
      # 2) 鸿蒙命令行 SDK
      # ----------------------------------------------------------
      - name: Download HarmonyOS command-line tools
        run: |
          set -euo pipefail
          echo "Downloading: $HOS_CMDLINE_URL"
          curl -L --fail -o cmdline-tools.zip "$HOS_CMDLINE_URL"
          ls -lh cmdline-tools.zip
          file cmdline-tools.zip
          unzip -q cmdline-tools.zip
          echo "--- unzip done, listing tree ---"
          ls -la
          ls -la command-line-tools/ || echo "no command-line-tools dir"
          ls -la command-line-tools/sdkmanager/bin/ || echo "no sdkmanager/bin"
          chmod +x command-line-tools/sdkmanager/bin/sdkmgr

      - name: Install OH SDK packages
        run: |
          set -euo pipefail
          export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS:-} -Duser.country=CN"
          # 注意: sdkmgr install 调华为服务器, 可能受 GFW 反向影响 (海外 runner
          # 拉国内服务器). 用 || true 兜底, 让下一步能看到具体缺啥
          command-line-tools/sdkmanager/bin/sdkmgr install \
            toolchains:9 OpenHarmony/toolchains:9 --accept-license || true
          echo "--- 检查产物 ---"
          ls -la hwsdk/ 2>/dev/null || echo "hwsdk dir 不存在"
          echo "HOS_SDK_HOME=$(pwd)/hwsdk" >> $GITHUB_ENV

      - name: Install hvigor
        run: |
          set -euo pipefail
          npm init -y > /dev/null
          npm config set @ohos:registry=https://repo.harmonyos.com/npm/
          npm install @ohos/hvigor@2.4.2 @ohos/hvigor-ohos-plugin@2.4.2

      # ----------------------------------------------------------
      # 3) 生成 ohos/ 工程
      # ----------------------------------------------------------
      - name: flutter create ohos platform
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          # || true: 不同 fork 版本对 --platforms ohos 支持差异大, 先尝试,
          # 失败也让后续 step 看到产物 (或缺产物)
          flutter create . --platforms ohos --org com.doudou --project-name doudou_blend_flutter || true
          echo "--- ohos/ 目录 ---"
          ls -la ohos/ 2>/dev/null || echo "ohos/ 未生成"

      # ----------------------------------------------------------
      # 4) pubspec_overrides
      # ----------------------------------------------------------
      - name: Write pubspec_overrides.yaml
        working-directory: doudou_blend_flutter
        run: |
          cat > pubspec_overrides.yaml <<'EOF'
          dependency_overrides:
            sqflite:
              git:
                url: https://gitcode.com/openharmony-sig/flutter_packages.git
                path: packages/sqflite/sqflite
            path_provider:
              git:
                url: https://gitcode.com/openharmony-sig/flutter_packages.git
                path: packages/path_provider/path_provider
            shared_preferences:
              git:
                url: https://gitcode.com/openharmony-sig/flutter_packages.git
                path: packages/shared_preferences/shared_preferences
          EOF
          cat pubspec_overrides.yaml

      - name: flutter pub get
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter pub get

      # ----------------------------------------------------------
      # 5) Build
      # ----------------------------------------------------------
      - name: flutter build hap --debug
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          export HOS_SDK_HOME=${{ github.workspace }}/hwsdk
          flutter build hap --debug 2>&1 | tee build.log

      - name: List build outputs
        if: always()
        working-directory: doudou_blend_flutter
        run: |
          find . -name "*.hap" -type f 2>/dev/null || echo "no .hap found"
          find . -path "*/outputs*" -type d 2>/dev/null | head -10

      # ----------------------------------------------------------
      # 6) Upload artifact (always, 拿 build.log debug)
      # ----------------------------------------------------------
      - name: Upload .hap artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doudou-blend-hap
          path: |
            doudou_blend_flutter/build/**/*.hap
            doudou_blend_flutter/build.log
          if-no-files-found: warn
          retention-days: 14
