# 豆哥配煤 - 鸿蒙 NEXT .hap 包构建
#
# 已修过的卡点:
#   - run 1: API rate limit → 硬编码 cmdline-tools URL
#   - run 2: pubspec_overrides sqflite 路径不存在 → 删 sqflite override
#   - run 3: Flutter OH fork shallow 没 tags → unshallow
#   - run 4: sdkmgr 调华为 CDN 海外不通 → 改用 openharmony-rs/setup-ohos-sdk
#   - run 5: flutter doctor 报 "Ohpm/Hvigorw missing" + "HarmonyOS Sdk not found"
#            → 加回 command-line-tools (含 ohpm + hvigorw + sdkmgr 二进制),
#              并把它们 bin 目录加进 GITHUB_PATH
name: Build HarmonyOS .hap

on:
  workflow_dispatch:
  push:
    tags:
      - 'hap-v*'

env:
  # 命令行工具 (含 ohpm / hvigorw / sdkmgr), 硬编码绕 GH API rate limit
  HOS_CMDLINE_URL: https://github.com/harmonyos-dev/hos-sdk/releases/download/v2.0.2/commandline-tools-mac-2.0.0.2.zip

jobs:
  build:
    name: Build .hap (experimental)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ----------------------------------------------------------
      # 1) Flutter OH fork (unshallow 拉 tags)
      # ----------------------------------------------------------
      - name: Clone Flutter OH fork (full, 含 tags)
        run: |
          set -euo pipefail
          git clone --depth 1 https://gitcode.com/openharmony-sig/flutter_flutter.git $HOME/flutter_ohos
          cd $HOME/flutter_ohos
          git fetch --unshallow
          git fetch --tags
          git describe --tags --abbrev=0 || echo "no tag found"
          echo "$HOME/flutter_ohos/bin" >> $GITHUB_PATH
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter --version

      - name: Pre-cache Flutter
        run: |
          set -euo pipefail
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter precache

      # ----------------------------------------------------------
      # 2) OH SDK 内容 (native + toolchains + ets + js + previewer)
      # ----------------------------------------------------------
      - name: Setup OpenHarmony SDK 6.1
        id: ohos_sdk
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: '6.1'
          components: 'all'
          cache: true

      # ----------------------------------------------------------
      # 3) command-line-tools (给 flutter doctor 找 ohpm + hvigorw 用)
      # ----------------------------------------------------------
      - name: Download command-line-tools (ohpm / hvigorw / sdkmgr 二进制)
        run: |
          set -euo pipefail
          cd $HOME
          echo "Downloading: $HOS_CMDLINE_URL"
          curl -L --fail -o cmdline-tools.zip "$HOS_CMDLINE_URL"
          unzip -q cmdline-tools.zip
          # zip 解出来一个 command-line-tools/ 目录
          echo "--- 解压后的内容 ---"
          ls -la command-line-tools/
          echo "--- bin 目录 ---"
          ls -la command-line-tools/bin/ 2>/dev/null || true
          ls -la command-line-tools/ohpm/bin/ 2>/dev/null || true
          ls -la command-line-tools/hvigor/bin/ 2>/dev/null || true
          ls -la command-line-tools/sdkmanager/bin/ 2>/dev/null || true
          # 找所有可执行的 bin 目录, 都加进 PATH
          for bindir in $(find command-line-tools -type d -name bin); do
            echo "Adding to PATH: $HOME/$bindir"
            chmod +x "$bindir"/* 2>/dev/null || true
            echo "$HOME/$bindir" >> $GITHUB_PATH
          done

      # ----------------------------------------------------------
      # 4) 诊断 SDK 内容 + flutter config + doctor
      # ----------------------------------------------------------
      - name: 诊断 - SDK 实际内容
        run: |
          set -euo pipefail
          NATIVE="${{ steps.ohos_sdk.outputs.ohos_sdk_native }}"
          BASE="${{ steps.ohos_sdk.outputs.ohos-base-sdk-home }}"
          echo "=== ohos_sdk_native = $NATIVE ==="
          echo "=== ohos-base-sdk-home = $BASE ==="
          echo "=== BASE 顶层 ==="
          ls -la "$BASE"
          echo "=== 找 native / toolchains / oh-uni-package.json ==="
          find "$BASE" -maxdepth 3 \( -name native -o -name toolchains -o -name "oh-uni-package.json" \) 2>/dev/null
          HOS_HOME="$(dirname "$NATIVE")"
          echo "HOS_SDK_HOME=$HOS_HOME" >> $GITHUB_ENV
          echo "选定 HOS_SDK_HOME = $HOS_HOME"

      - name: flutter config --ohos-sdk
        run: |
          set -euo pipefail
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter config --ohos-sdk "$HOS_SDK_HOME"

      - name: flutter doctor -v
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          # ohpm/hvigorw 应当在 PATH 里, doctor 不该再 missing
          which ohpm || echo "ohpm not in PATH"
          which hvigorw || echo "hvigorw not in PATH"
          flutter doctor -v || true

      # ----------------------------------------------------------
      # 5) hvigor (npm 装的, flutter create 内部也用)
      # ----------------------------------------------------------
      - name: Install hvigor npm package
        run: |
          set -euo pipefail
          npm init -y > /dev/null
          npm config set @ohos:registry=https://repo.harmonyos.com/npm/
          npm install @ohos/hvigor@2.4.2 @ohos/hvigor-ohos-plugin@2.4.2

      # ----------------------------------------------------------
      # 6) 生成 ohos/ 工程
      # ----------------------------------------------------------
      - name: flutter create ohos platform
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter create . --platforms ohos --org com.doudou --project-name doudou_blend_flutter || true
          ls -la ohos/ 2>/dev/null || echo "ohos/ 未生成"

      # ----------------------------------------------------------
      # 7) pubspec_overrides
      # ----------------------------------------------------------
      - name: Write pubspec_overrides.yaml
        working-directory: doudou_blend_flutter
        run: |
          cat > pubspec_overrides.yaml <<'EOF'
          dependency_overrides:
            path_provider:
              git:
                url: https://gitcode.com/openharmony-sig/flutter_packages.git
                path: packages/path_provider/path_provider
            shared_preferences:
              git:
                url: https://gitcode.com/openharmony-sig/flutter_packages.git
                path: packages/shared_preferences/shared_preferences
          EOF
          cat pubspec_overrides.yaml

      - name: flutter pub get
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter pub get

      # ----------------------------------------------------------
      # 8) Build
      # ----------------------------------------------------------
      - name: flutter build hap --debug
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          echo "HOS_SDK_HOME=$HOS_SDK_HOME"
          flutter build hap --debug 2>&1 | tee build.log

      - name: List build outputs
        if: always()
        working-directory: doudou_blend_flutter
        run: |
          find . -name "*.hap" -type f 2>/dev/null || echo "no .hap found"
          find . -path "*/outputs*" -type d 2>/dev/null | head -10

      # ----------------------------------------------------------
      # 9) Upload artifact
      # ----------------------------------------------------------
      - name: Upload .hap artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doudou-blend-hap
          path: |
            doudou_blend_flutter/build/**/*.hap
            doudou_blend_flutter/build.log
          if-no-files-found: warn
          retention-days: 14
