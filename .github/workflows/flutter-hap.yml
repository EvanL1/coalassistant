# 豆哥配煤 - 鸿蒙 NEXT .hap 包构建
#
# 触发: 仅手动 (workflow_dispatch) 或 hap-v* tag.
# 不挂 push/PR, 避免每次烧 GH Actions macOS 配额 (10x 乘数).
#
# 产物: doudou_blend_flutter/build/ohos/outputs/.../entry-default-unsigned.hap
#       作为 GH Actions artifact 上传, 14 天保留.
#
# **当前状态: 实验性**
# 鸿蒙 Flutter 工程在 CI 上构建链路是:
#   1. 拉 OpenHarmony Flutter fork SDK (gitcode 镜像) - shallow + unshallow 拉 tags
#   2. 用 openharmony-rs/setup-ohos-sdk action 装 OH SDK 6.1 (API 23,
#      对应 Mate X5 鸿蒙 6.1). 这个 action 是 GitHub Releases mirror,
#      不调华为 CDN, 海外 runner 也能 30 秒拉下来 + 自动缓存
#   3. 装 hvigor 通过 npm @ohos:registry
#   4. flutter create . --platforms ohos (生成 ohos/ 模块)
#   5. pubspec_overrides.yaml 把 path_provider / shared_preferences 指
#      向 openharmony-sig/flutter_packages
#   6. flutter pub get
#   7. flutter build hap --debug → unsigned .hap
#
# 已修过的卡点:
#   - run 1: API rate limit (cmdline-tools 用 API 查 latest) → 硬编码 URL
#     [此版本已经不需要 cmdline-tools 了, 整个步骤删了]
#   - run 2: pubspec_overrides 用了不存在的 sqflite 路径 → 删 sqflite override
#   - run 3: Flutter OH fork shallow 没 tags, version=0.0.0 → unshallow
#   - run 4: sdkmgr 调华为 CDN 海外不通, HOS_SDK_HOME 指向空目录 → 改用
#     openharmony-rs/setup-ohos-sdk
#
# 还可能踩的:
#   - sqflite 没 ohos 端口 (flutter build hap 时会报)
#   - flutter create ohos 命令行支持差异
#   - 签名: 当前只出 unsigned .hap, 装真机需要 dev cert. 后续加 secrets.
name: Build HarmonyOS .hap

on:
  workflow_dispatch:
  push:
    tags:
      - 'hap-v*'

jobs:
  build:
    name: Build .hap (experimental)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ----------------------------------------------------------
      # 1) Flutter for OpenHarmony fork (必须 unshallow 拉 tags)
      # ----------------------------------------------------------
      - name: Clone Flutter OH fork (full, 含 tags)
        run: |
          set -euo pipefail
          git clone --depth 1 https://gitcode.com/openharmony-sig/flutter_flutter.git $HOME/flutter_ohos
          cd $HOME/flutter_ohos
          echo "--- 补拉 tags (flutter --version 解析依赖) ---"
          git fetch --unshallow
          git fetch --tags
          git describe --tags --abbrev=0 || echo "no tag found"
          echo "$HOME/flutter_ohos/bin" >> $GITHUB_PATH
          export PATH=$HOME/flutter_ohos/bin:$PATH
          echo "--- flutter --version 输出 ---"
          flutter --version

      - name: Pre-cache Flutter
        run: |
          set -euo pipefail
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter precache

      # ----------------------------------------------------------
      # 2) OH SDK 6.1 (API 23, 对应 Mate X5 鸿蒙 6.1)
      #    走 GitHub Releases mirror, 不调华为 CDN
      # ----------------------------------------------------------
      - name: Setup OpenHarmony SDK 6.1
        id: ohos_sdk
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: '6.1'
          cache: true

      - name: Compute HOS_SDK_HOME (native 的上一级)
        run: |
          set -euo pipefail
          NATIVE="${{ steps.ohos_sdk.outputs.ohos_sdk_native }}"
          echo "ohos_sdk_native = $NATIVE"
          HOS_HOME="$(dirname "$NATIVE")"
          echo "HOS_SDK_HOME = $HOS_HOME"
          echo "HOS_SDK_HOME=$HOS_HOME" >> $GITHUB_ENV
          ls -la "$HOS_HOME"

      # ----------------------------------------------------------
      # 3) hvigor (鸿蒙构建工具, 通过 npm)
      # ----------------------------------------------------------
      - name: Install hvigor
        run: |
          set -euo pipefail
          npm init -y > /dev/null
          npm config set @ohos:registry=https://repo.harmonyos.com/npm/
          npm install @ohos/hvigor@2.4.2 @ohos/hvigor-ohos-plugin@2.4.2

      # ----------------------------------------------------------
      # 4) 生成 ohos/ 工程
      # ----------------------------------------------------------
      - name: flutter create ohos platform
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter create . --platforms ohos --org com.doudou --project-name doudou_blend_flutter || true
          echo "--- ohos/ 目录 ---"
          ls -la ohos/ 2>/dev/null || echo "ohos/ 未生成"

      # ----------------------------------------------------------
      # 5) pubspec_overrides — 只保留确认有 OH 端口的两个
      # ----------------------------------------------------------
      - name: Write pubspec_overrides.yaml
        working-directory: doudou_blend_flutter
        run: |
          cat > pubspec_overrides.yaml <<'EOF'
          dependency_overrides:
            path_provider:
              git:
                url: https://gitcode.com/openharmony-sig/flutter_packages.git
                path: packages/path_provider/path_provider
            shared_preferences:
              git:
                url: https://gitcode.com/openharmony-sig/flutter_packages.git
                path: packages/shared_preferences/shared_preferences
          EOF
          cat pubspec_overrides.yaml

      - name: flutter pub get
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          flutter pub get

      # ----------------------------------------------------------
      # 6) Build
      # ----------------------------------------------------------
      - name: flutter build hap --debug
        working-directory: doudou_blend_flutter
        run: |
          export PATH=$HOME/flutter_ohos/bin:$PATH
          # HOS_SDK_HOME 已经在前面的 step export 到 GITHUB_ENV
          echo "HOS_SDK_HOME=$HOS_SDK_HOME"
          flutter build hap --debug 2>&1 | tee build.log

      - name: List build outputs
        if: always()
        working-directory: doudou_blend_flutter
        run: |
          find . -name "*.hap" -type f 2>/dev/null || echo "no .hap found"
          find . -path "*/outputs*" -type d 2>/dev/null | head -10

      # ----------------------------------------------------------
      # 7) Upload artifact (always)
      # ----------------------------------------------------------
      - name: Upload .hap artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doudou-blend-hap
          path: |
            doudou_blend_flutter/build/**/*.hap
            doudou_blend_flutter/build.log
          if-no-files-found: warn
          retention-days: 14
