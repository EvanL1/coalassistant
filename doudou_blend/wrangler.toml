# Cloudflare Worker + Static Assets 配置
#
# 部署模型 (新): 单个 Worker 处理 /api/*, 静态资源 fallback 走 [assets].
#
# 部署步骤 (本地, 在 doudou_blend/ 目录下):
#   1. npx wrangler login
#   2. npm install && npm run build
#   3. npx wrangler d1 execute coalassistant --remote --file=../cloudflare/schema.sql
#   4. npx wrangler secret put AUTH_PASS   # 输入密码 (跟前端一致)
#   5. npx wrangler deploy
#
# Cloudflare Workers Builds (Dashboard 接 Git) 配置:
#   - Root directory:   doudou_blend
#   - Build command:    npm install && npm run build
#   - Deploy command:   npx wrangler deploy

name = "coalassistant"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
# SPA 模式: 任何未匹配静态文件的路径回退到 index.html (React Router)
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "coalassistant"
database_id = "6d3637c4-f35e-4892-b2da-1d0caf445616"

# AUTH_PASS 不写这里! 它是 secret, 用 wrangler secret put AUTH_PASS
# 或 Dashboard Variables and secrets → Add → 标记 "Encrypt"
